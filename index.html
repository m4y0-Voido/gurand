<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<title>タグ装備シューター</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
#topbar{background:#020617;padding:10px}
button{padding:8px 12px;margin:4px;border:none;border-radius:6px;background:#38bdf8;color:black;font-weight:bold;cursor:pointer}
button:hover{background:#0ea5e9}
.panel{padding:15px}
.grid{display:grid;grid-template-columns:repeat(2,200px);gap:10px}
.slot{background:#1e293b;padding:10px;border-radius:8px}
.item{background:#334155;margin:4px;padding:6px;border-radius:6px;cursor:pointer}
canvas{background:black;border:2px solid #38bdf8}
</style>
</head>
<body><div id="topbar">
<button onclick="showHome()">ホーム</button>
<button onclick="showEquip()">装備</button>
<button onclick="showSkills()">スキル</button>
<button onclick="startGame()">出撃</button>
</div><div id="home" class="panel"></div>
<div id="equip" class="panel" style="display:none"></div>
<div id="skills" class="panel" style="display:none"></div>
<div id="game" class="panel" style="display:none">
<canvas id="gameCanvas" width="600" height="400"></canvas>
</div><script>

const baseStats={
attack:10,
support:-30,
stability:30,
defense:5,
hp:100,
speed:100
}

let equipment={
head:null,
body:null,
legs:null,
mind:null
}

const items=[
{name:"戦術ヘルム",slot:"head",tags:["軍"] ,attack:2},
{name:"軽量ヘルム",slot:"head",tags:["機動"],speed:10},
{name:"装甲スーツ",slot:"body",tags:["軍"],defense:4},
{name:"高速スーツ",slot:"body",tags:["機動"],speed:20},
{name:"強化ブーツ",slot:"legs",tags:["軍"],speed:15},
{name:"跳躍ブーツ",slot:"legs",tags:["機動"],speed:25},
{name:"戦闘心得",slot:"mind",tags:["軍"],attack:3},
{name:"機動心得",slot:"mind",tags:["機動"],speed:15}
]

let skillLimit=5
let skills=[]

const skillList=[
"連射","拡散弾","シールド","自動回復","ホーミング",
"爆発弾","レーザー","ドローン","時間減速","クリティカル"
]

function calculateStats(){
let s={...baseStats}
let tagCount={}

for(let k in equipment){
let it=equipment[k]
if(!it)continue

for(let stat in it){
if(s[stat]!=undefined)s[stat]+=it[stat]
}

it.tags.forEach(t=>{
if(!tagCount[t])tagCount[t]=0
 tagCount[t]++
})
}

for(let tag in tagCount){
if(tagCount[tag]>=3){
 s.attack+=3
 s.speed+=10
}
}

return s
}

function showHome(){
hideAll()
let s=calculateStats()

home.innerHTML=`
<h2>ステータス</h2>
攻撃 ${s.attack}<br>
補助率 ${s.support}%<br>
安定率 ${s.stability}%<br>
防御 ${s.defense}<br>
体力 ${s.hp}<br>
速度 ${s.speed}

<h3>装備</h3>
頭:${equipment.head?.name||"なし"}<br>
体:${equipment.body?.name||"なし"}<br>
足:${equipment.legs?.name||"なし"}<br>
心得:${equipment.mind?.name||"なし"}

<h3>スキル</h3>
${skills.join(", ")||"なし"}
`

home.style.display="block"
}

function showEquip(){
hideAll()

equip.innerHTML="<h2>装備変更</h2>"

items.forEach(it=>{
let d=document.createElement("div")
d.className="item"
d.innerText=`${it.name} (${it.slot}) [${it.tags}]`
d.onclick=()=>{
equipment[it.slot]=it
showEquip()
}
equip.appendChild(d)
})

equip.style.display="block"
}

function showSkills(){
hideAll()

skillsDiv.innerHTML="<h2>スキル設定</h2>"

skillList.forEach(s=>{
let d=document.createElement("div")
d.className="item"
d.innerText=s

d.onclick=()=>{
if(skills.includes(s)){
skills=skills.filter(x=>x!=s)
}else{
if(skills.length<skillLimit)skills.push(s)
}
showSkills()
}

skillsDiv.appendChild(d)
})

skillsDiv.style.display="block"
}

function hideAll(){
home.style.display="none"
equip.style.display="none"
skills.style.display="none"
game.style.display="none"
}

let player={x:300,y:350}
let bullets=[]
let enemies=[]

function startGame(){
hideAll()
game.style.display="block"

const canvas=document.getElementById("gameCanvas")
const ctx=canvas.getContext("2d")

player={x:300,y:350}
bullets=[]
enemies=[]

setInterval(()=>{
enemies.push({x:Math.random()*600,y:0})
},1000)

function loop(){
ctx.clearRect(0,0,600,400)

ctx.fillStyle="cyan"
ctx.fillRect(player.x-10,player.y-10,20,20)

bullets.forEach(b=>{
b.y-=6
ctx.fillStyle="yellow"
ctx.fillRect(b.x,b.y,4,8)
})

for(let e of enemies){
e.y+=2
ctx.fillStyle="red"
ctx.fillRect(e.x,e.y,20,20)
}

requestAnimationFrame(loop)
}

loop()

window.onkeydown=e=>{
if(e.key=="ArrowLeft")player.x-=5
if(e.key=="ArrowRight")player.x+=5
if(e.key==" ")bullets.push({x:player.x,y:player.y})
}
}

showHome()

</script></body>
</html>
