<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>超次元レース：ツインブラッド</title>
<style>
body{font-family:Arial;background:#0f172a;color:#e5e7eb;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-top:15px}
button{padding:10px 16px;margin:5px;border:none;border-radius:8px;background:#38bdf8;color:#021018;font-weight:bold;cursor:pointer}
button:hover{background:#0ea5e9}
select{padding:8px;margin:5px}
.stat{margin:5px}
.track{background:#020617;border-radius:8px;padding:10px}
.lane{display:flex;align-items:center;margin:6px 0}
.name{width:120px;text-align:right;margin-right:8px}
.barbg{flex:1;background:#1e293b;border-radius:6px;height:18px;overflow:hidden}
.bar{height:100%;background:#38bdf8;width:0%}
.log{background:#020617;padding:10px;border-radius:8px;height:120px;overflow:auto;text-align:left;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>超次元レース：ツインブラッド</h1>

<div class="card" id="setup">
<h2>種族を2つ選ぶ</h2>
<select id="race1"></select>
<select id="race2"></select>
<br>
<button onclick="startGame()">融合して育成開始</button>
</div>

<div class="card" id="game" style="display:none">
<h2 id="fusionName"></h2>
<div id="stats"></div>
<h3>行動</h3>
<button onclick="train('speed')">スピード訓練</button>
<button onclick="train('stamina')">スタミナ訓練</button>
<button onclick="train('power')">パワー訓練</button>
<button onclick="train('wisdom')">研究</button>
<button onclick="rest()">休息</button>
<p>残りターン: <span id="turn"></span></p>
</div>

<div class="card" id="race" style="display:none">
<h2>レース</h2>
<div class="track" id="track"></div>
<div class="log" id="log"></div>
<button onclick="location.reload()">もう一度遊ぶ</button>
</div>

</div>

<script>
const races=["巨人","妖精","人間","魔人","天使","虫人","竜人","魚人","幻影","機械","猛禽","猫又","堕天","悪魔","植人","星人","鉱人"]

let stats={speed:0,stamina:0,power:0,wisdom:0,guts:5}
let turn=10

let racers=[]
let progress=[]
let interval

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function populate(){
const r1=document.getElementById("race1")
const r2=document.getElementById("race2")

races.forEach(r=>{
let o=document.createElement("option")
o.text=r
r1.add(o.cloneNode(true))
r2.add(o.cloneNode(true))
})
}

function startGame(){
const r1=document.getElementById("race1").value
const r2=document.getElementById("race2").value

if(r1===r2){alert("違う種族を選んでください");return}

stats.speed=rand(6,10)
stats.stamina=rand(6,10)
stats.power=rand(6,10)
stats.wisdom=rand(6,10)

document.getElementById("fusionName").innerText=`${r1} × ${r2} 融合レーサー`

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

update()
}

function update(){
let s=stats

document.getElementById("stats").innerHTML=`
<div class='stat'>スピード: ${s.speed}</div>
<div class='stat'>スタミナ: ${s.stamina}</div>
<div class='stat'>パワー: ${s.power}</div>
<div class='stat'>賢さ: ${s.wisdom}</div>
`

document.getElementById("turn").innerText=turn

if(turn<=0)startRace()
}

function train(type){
let gain=rand(1,3)
stats[type]+=gain
turn--
update()
}

function rest(){
stats.guts+=1
turn--
update()
}

function startRace(){
document.getElementById("game").style.display="none"
document.getElementById("race").style.display="block"

const track=document.getElementById("track")
const log=document.getElementById("log")

racers=["あなた","AI-1","AI-2","AI-3","AI-4"]
progress=[0,0,0,0,0]

track.innerHTML=""

racers.forEach((r,i)=>{
const lane=document.createElement("div")
lane.className="lane"

lane.innerHTML=`
<div class='name'>${r}</div>
<div class='barbg'>
<div class='bar' id='bar${i}'></div>
</div>`

track.appendChild(lane)
})

log.innerHTML="レース開始！"

interval=setInterval(raceTick,500)
}

function raceTick(){
const log=document.getElementById("log")

for(let i=0;i<racers.length;i++){

let move

if(i===0){
move = stats.speed*0.6 + stats.stamina*0.3 + stats.power*0.2 + rand(0,3)
}
else{
move = rand(4,10)
}

progress[i]+=move

let percent=Math.min(progress[i],100)

document.getElementById("bar"+i).style.width=percent+"%"

if(progress[i]>=100){
clearInterval(interval)
finishRace(i)
return
}
}
}

function finishRace(winner){
const log=document.getElementById("log")

if(winner===0){
log.innerHTML+="<br>🏆 あなたの勝利！"
}
else{
log.innerHTML+=`<br>💀 勝者: ${racers[winner]}`
}
}

populate()
</script>
</body>
</html>
