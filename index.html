<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friend TFT Builder</title>
  <style>
    :root {
      --bg: #040814;
      --panel: #071225;
      --panel-2: #0b1730;
      --panel-3: #09111f;
      --line: #112447;
      --line-soft: rgba(122, 163, 255, 0.18);
      --text: #f5f7ff;
      --sub: #9eb0d7;
      --muted: #6680b8;
      --teal: #20e3c2;
      --teal-soft: rgba(32, 227, 194, 0.16);
      --blue: #55a3ff;
      --purple: #b56cff;
      --gold: #f5b83d;
      --red: #ff6584;
      --green: #4ade80;
      --cost1: #bfc7d8;
      --cost2: #5ee68d;
      --cost3: #58a8ff;
      --cost4: #cb8bff;
      --cost5: #ffc857;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.34);
      --radius: 16px;
      --radius-sm: 12px;
      --tile-size: 104px;
      --bench-size: 92px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(32, 227, 194, 0.08), transparent 18%),
        radial-gradient(circle at top right, rgba(181, 108, 255, 0.10), transparent 20%),
        linear-gradient(180deg, #030712 0%, #030814 100%);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 250px 1fr 340px;
      height: 100vh;
    }

    .panel {
      background: linear-gradient(180deg, rgba(7,18,37,0.96), rgba(4,10,21,0.96));
      border-right: 1px solid var(--line);
      min-height: 0;
    }

    .left {
      
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
    }

    .center {
      min-width: 0;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(22, 9, 18, 0.42) 0 57%, rgba(4, 20, 48, 0.46) 57% 100%),
        linear-gradient(180deg, #030814 0%, #071225 100%);
      position: relative;
    }

    .right {
      padding: 14px;
      border-left: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
    }

    .block {
      background: linear-gradient(180deg, rgba(9,17,31,0.98), rgba(5,12,24,0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    h1, h2, h3, p { margin: 0; }

    .app-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: #dbf5ff;
      text-transform: uppercase;
    }

    .subtext { color: var(--sub); font-size: 12px; line-height: 1.5; }
    .tiny { color: var(--muted); font-size: 11px; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 10, 20, 0.55);
      backdrop-filter: blur(12px);
    }

    .toolbar-left, .toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill, button, select, input, textarea {
      font: inherit;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: var(--sub);
      font-size: 12px;
    }

    .btn {
      background: #0b1830;
      color: var(--text);
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      padding: 9px 12px;
      cursor: pointer;
      transition: .16s ease;
    }

    .btn:hover { transform: translateY(-1px); background: #0f1e3c; }
    .btn.primary { background: linear-gradient(180deg, #11396b, #0a2548); }
    .btn.danger { background: linear-gradient(180deg, #481522, #300d15); border-color: rgba(255,101,132,0.25); }

    .synergy-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .synergy-item {
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 9px 10px;
      background: rgba(255,255,255,0.02);
    }

    .synergy-item.active {
      border-color: rgba(32, 227, 194, 0.5);
      box-shadow: 0 0 0 1px rgba(32,227,194,0.14) inset;
      background: linear-gradient(180deg, rgba(5,27,33,0.9), rgba(7,22,29,0.9));
    }

    .synergy-count {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #ffe8a3;
      background: linear-gradient(180deg, #1b2134, #0d1325);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .synergy-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .synergy-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .progress {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f7cf68, #21e4c2);
    }

    .board-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      min-height: 0;
    }

    .board-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(6, var(--tile-size));
      grid-template-rows: repeat(3, var(--tile-size));
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(8,14,28,0.7), rgba(5,9,18,0.7));
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), var(--shadow);
    }

    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      border-radius: 14px;
      border: 1px solid rgba(120, 28, 56, 0.35);
      background:
        linear-gradient(180deg, rgba(43, 5, 19, 0.42), rgba(16, 6, 13, 0.42)),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }

    .tile:nth-child(n+13) {
      border-color: rgba(23, 80, 162, 0.35);
      background:
        linear-gradient(180deg, rgba(3, 18, 58, 0.38), rgba(4, 13, 33, 0.46)),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
    }

    .bench-wrap {
      width: 100%;
      padding: 0 18px 18px;
    }

    .bench-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(7,18,37,0.96), rgba(5,10,20,0.96));
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .bench-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .search {
      flex: 1;
      min-width: 180px;
      background: #071124;
      color: var(--text);
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.03);
      color: var(--sub);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
    }

    .chip.active {
      color: white;
      border-color: rgba(32, 227, 194, 0.45);
      background: rgba(32,227,194,0.12);
    }

    .bench-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 12px;
    }

    .unit-btn, .placed-unit {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2px;
      cursor: pointer;
      overflow: hidden;
      user-select: none;
      transition: transform .14s ease, filter .14s ease;
    }

    .unit-btn:hover, .placed-unit:hover { transform: translateY(-2px) scale(1.02); }

    .ring-cost-1 { border: 3px solid var(--cost1); box-shadow: 0 0 18px rgba(191,199,216,0.35), inset 0 0 18px rgba(191,199,216,0.10); }
    .ring-cost-2 { border: 3px solid var(--cost2); box-shadow: 0 0 18px rgba(94,230,141,0.35), inset 0 0 18px rgba(94,230,141,0.10); }
    .ring-cost-3 { border: 3px solid var(--cost3); box-shadow: 0 0 18px rgba(88,168,255,0.35), inset 0 0 18px rgba(88,168,255,0.10); }
    .ring-cost-4 { border: 3px solid var(--cost4); box-shadow: 0 0 18px rgba(203,139,255,0.35), inset 0 0 18px rgba(203,139,255,0.10); }
    .ring-cost-5 { border: 3px solid var(--cost5); box-shadow: 0 0 18px rgba(255,200,87,0.35), inset 0 0 18px rgba(255,200,87,0.10); }

    .unit-btn {
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.10), rgba(255,255,255,0.02) 45%, rgba(255,255,255,0.01) 55%), #0e1f3c;
      padding: 10px;
    }

    .placed-unit {
      width: 86px;
      height: 86px;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.14), rgba(255,255,255,0.02) 45%, rgba(255,255,255,0.01) 60%), #0e1f3c;
      padding: 8px;
    }

    .unit-name {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.1;
      max-width: 76px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .unit-stars {
      font-size: 11px;
      color: #ffd76b;
      letter-spacing: 0.06em;
    }

    .unit-role {
      font-size: 10px;
      color: var(--sub);
      line-height: 1;
    }

    .unit-cost-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
      background: rgba(2,8,23,0.85);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .empty-note {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 24px 0 10px;
    }

    .stat-card, .detail-card, .editor-card {
      padding: 14px;
    }

    .detail-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .detail-avatar {
      width: 80px;
      height: 80px;
      flex: 0 0 80px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.14), rgba(255,255,255,0.02) 45%, rgba(255,255,255,0.01) 60%), #0e1f3c;
      font-size: 18px;
      font-weight: 800;
    }

    .tag-row, .star-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .tag {
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 999px;
      color: #dce8ff;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .star-btn {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line-soft);
      background: #081529;
      color: var(--sub);
      cursor: pointer;
      font-weight: 700;
    }

    .star-btn.active {
      background: rgba(32,227,194,0.14);
      color: white;
      border-color: rgba(32,227,194,0.42);
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    .stats-table th, .stats-table td {
      padding: 8px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: left;
    }

    .stats-table th { color: var(--sub); font-weight: 600; }

    .skill-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .effect-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(32,227,194,0.06);
      border: 1px solid rgba(32,227,194,0.12);
      color: #d4fff7;
      font-size: 13px;
      line-height: 1.55;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .editor-title { font-size: 14px; font-weight: 800; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .field label { color: var(--sub); font-size: 12px; }

    .field input, .field textarea, .field select {
      background: #071124;
      color: var(--text);
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 10px 12px;
      width: 100%;
    }

    .field textarea { min-height: 96px; resize: vertical; }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .notice {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.55;
      margin-top: 8px;
    }

    .list-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .selected-outline {
      outline: 2px solid rgba(32,227,194,0.55);
      outline-offset: 2px;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .slot-indicator {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.38);
    }

    .small-title {
      font-size: 12px;
      font-weight: 800;
      color: #d7e2ff;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    @media (max-width: 1360px) {
      .app { grid-template-columns: 230px 1fr 320px; }
      :root { --tile-size: 92px; }
    }

    @media (max-width: 1180px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; }
      .panel, .right { border: 0; }
      .left, .right { max-height: none; }
      .center { min-height: 760px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel left">
      <div class="title-row">
        <div>
          <div class="app-title">Synergies</div>
          <p class="subtext">配置中のユニットから自動計算</p>
        </div>
      </div>
      <div class="block stat-card">
        <div class="title-row">
          <h2 class="small-title">現在の発動状況</h2>
          <span class="pill"><span id="unitCount">0</span> / 18</span>
        </div>
        <div id="synergyList" class="synergy-list"></div>
      </div>
      <div class="block stat-card">
        <div class="title-row">
          <h2 class="small-title">ビルド操作</h2>
        </div>
        <div class="footer-actions">
          <button class="btn" id="clearBoardBtn">盤面クリア</button>
          <button class="btn" id="copyBuildBtn">構成コピー</button>
          <button class="btn primary" id="saveLocalBtn">ブラウザ保存</button>
        </div>
        <p class="notice">左クリックで選択、盤面クリックで配置。盤面の駒は右クリックまたはダブルクリックで削除できます。</p>
      </div>
      <div class="block editor-card">
        <div class="editor-title">共有テキスト</div>
        <div class="field">
          <label for="buildText">このテキストを保存・共有できます</label>
          <textarea id="buildText" class="mono" readonly></textarea>
        </div>
      </div>
    </aside>

    <main class="center">
      <div class="toolbar">
        <div class="toolbar-left">
          <div>
            <div class="app-title">Friend TFT Builder</div>
            <p class="subtext">MetaTFT風ビルドツール / 3×6 ボード</p>
          </div>
          <span class="pill">選択中: <strong id="selectedUnitLabel">なし</strong></span>
        </div>
        <div class="toolbar-right">
          <button class="btn" id="importBtn">保存データ読込</button>
          <button class="btn danger" id="resetStorageBtn">保存削除</button>
        </div>
      </div>

      <div class="board-wrap">
        <div class="board-area">
          <div id="board" class="board-grid"></div>
        </div>
      </div>

      <div class="bench-wrap">
        <div class="bench-panel">
          <div class="bench-toolbar">
            <input id="searchInput" class="search" placeholder="キャラ名・シナジー・役割で検索" />
            <select id="costFilter" class="btn">
              <option value="all">全コスト</option>
              <option value="1">1コスト</option>
              <option value="2">2コスト</option>
              <option value="3">3コスト</option>
              <option value="4">4コスト</option>
              <option value="5">5コスト</option>
            </select>
          </div>
          <div id="synergyFilterChips" class="chips"></div>
          <div id="bench" class="bench-grid"></div>
        </div>
      </div>
    </main>

    <aside class="panel right">
      <div class="block detail-card" id="detailCard"></div>
      <div class="block editor-card">
        <div class="title-row">
          <div>
            <div class="editor-title">追記・修正しやすいデータ編集</div>
            <div class="subtext">下のJSONを編集して差し替えれば追加可能</div>
          </div>
        </div>
        <div class="field">
          <label for="dataEditor">選択中キャラのJSON</label>
          <textarea id="dataEditor" class="mono"></textarea>
        </div>
        <div class="footer-actions">
          <button class="btn primary" id="applyJsonBtn">このキャラに反映</button>
          <button class="btn" id="downloadJsonBtn">全データをJSON保存</button>
        </div>
        <p class="notice">stats は <span class="mono">[★1, ★2, ★3]</span> の順です。例: <span class="mono">"hp": [400, 600, 800]</span></p>
      </div>
    </aside>
  </div>

    function createUnitElement(name, mode = "bench") {
      const unit = gameData.units[name];
      const div = document.createElement("div");
      div.className = `${mode === "bench" ? "unit-btn" : "placed-unit"} ring-cost-${unit.cost}`;
      if (state.selectedUnit === name && mode === "bench") div.classList.add("selected-outline");
      div.innerHTML = `
        <div class="unit-cost-badge">${unit.cost}</div>
        <div class="unit-name">${name}</div>
        <div class="unit-stars">★</div>
        <div class="unit-role">${unit.role}</div>
      `;
      return div;
    }

    function getAllSynergyNames() {
      const set = new Set(Object.keys(gameData.synergies));
      Object.values(gameData.units).forEach(u => u.synergy.forEach(s => set.add(s)));
      return Array.from(set);
    }

    function renderSynergyChips() {
      const names = ["all", ...getAllSynergyNames()];
      el.synergyFilterChips.innerHTML = "";
      names.forEach(name => {
        const chip = document.createElement("button");
        chip.className = `chip ${state.synergyFilter === name ? "active" : ""}`;
        chip.textContent = name === "all" ? "全シナジー" : name;
        chip.addEventListener("click", () => {
          state.synergyFilter = name;
          renderBench();
          renderSynergyChips();
        });
        el.synergyFilterChips.appendChild(chip);
      });
    }

    function renderBench() {
      const query = state.search.trim().toLowerCase();
      const units = Object.entries(gameData.units)
        .filter(([name, unit]) => {
          const matchesSearch = !query || name.toLowerCase().includes(query) || unit.role.toLowerCase().includes(query) || unit.synergy.some(s => s.toLowerCase().includes(query));
          const matchesCost = state.costFilter === "all" || String(unit.cost) === state.costFilter;
          const matchesSynergy = state.synergyFilter === "all" || unit.synergy.includes(state.synergyFilter);
          return matchesSearch && matchesCost && matchesSynergy;
        })
        .sort((a, b) => a[1].cost - b[1].cost || a[0].localeCompare(b[0], "ja"));

      el.bench.innerHTML = "";
      if (!units.length) {
        el.bench.innerHTML = `<div class="empty-note">該当キャラがいません</div>`;
        return;
      }

      units.forEach(([name]) => {
        const card = createUnitElement(name, "bench");
        card.title = `${name} / ${gameData.units[name].synergy.join(" / ")}`;
        card.addEventListener("click", () => {
          state.selectedUnit = name;
          state.selectedDetailUnit = name;
          state.detailStar = 1;
          el.selectedUnitLabel.textContent = name;
          syncEditor();
          renderBench();
          renderDetail();
        });
        card.addEventListener("dblclick", () => placeInFirstEmpty(name));
        el.bench.appendChild(card);
      });
    }

    function renderBoard() {
      el.board.innerHTML = "";
      state.board.forEach((slot, index) => {
        const tile = document.createElement("div");
        tile.className = "tile";
        if (state.selectedTileIndex === index) tile.classList.add("selected-outline");
        tile.innerHTML = `<div class="slot-indicator">${index + 1}</div>`;
        tile.addEventListener("click", () => {
          state.selectedTileIndex = index;
          if (state.selectedUnit) {
            state.board[index] = { name: state.selectedUnit, star: 1 };
            state.selectedDetailUnit = state.selectedUnit;
            state.detailStar = 1;
            syncEditor();
          } else if (slot) {
            state.selectedDetailUnit = slot.name;
            state.detailStar = slot.star;
          }
          renderAll();
        });
        tile.addEventListener("dblclick", () => {
          state.board[index] = null;
          renderAll();
        });
        tile.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          state.board[index] = null;
          renderAll();
        });

        if (slot) {
          const unitNode = createUnitElement(slot.name, "placed");
          unitNode.querySelector(".unit-stars").textContent = "★".repeat(slot.star);
          unitNode.addEventListener("click", (e) => {
            e.stopPropagation();
            state.selectedTileIndex = index;
            state.selectedDetailUnit = slot.name;
            state.detailStar = slot.star;
            renderAll();
          });
          unitNode.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            state.board[index] = null;
            renderAll();
          });
          tile.appendChild(unitNode);
        }
        el.board.appendChild(tile);
      });
    }

    function countSynergies() {
      const counts = {};

      // 同キャラは1回だけシナジー計算する
      const uniqueUnits = new Set();

      state.board.filter(Boolean).forEach(slot => {
        if (uniqueUnits.has(slot.name)) return;
        uniqueUnits.add(slot.name);

        const unit = gameData.units[slot.name];
        unit.synergy.forEach(s => {
          counts[s] = (counts[s] || 0) + 1;
        });
      });

      return counts;
    }

    function getActiveBreakpoint(name, count) {
      const info = gameData.synergies[name];
      if (!info) return null;
      let activeIndex = -1;
      info.levels.forEach((lv, i) => { if (count >= lv) activeIndex = i; });
      if (activeIndex === -1) return null;
      return {
        threshold: info.levels[activeIndex],
        value: info.values[activeIndex],
        label: info.effectLabel,
        suffix: info.suffix || ""
      };
    }

    function nextBreakpoint(name, count) {
      const info = gameData.synergies[name];
      if (!info) return null;
      return info.levels.find(lv => lv > count) || null;
    }

    function renderSynergies() {
      const counts = countSynergies();
      const names = getAllSynergyNames().sort((a, b) => {
        const aCount = counts[a] || 0;
        const bCount = counts[b] || 0;
        return bCount - aCount || a.localeCompare(b, "ja");
      });

      el.synergyList.innerHTML = "";
      names.forEach(name => {
        const count = counts[name] || 0;
        const info = gameData.synergies[name];
        const active = getActiveBreakpoint(name, count);
        const next = nextBreakpoint(name, count);
        const maxLevel = info?.levels?.[info.levels.length - 1] || Math.max(count, 1);
        const fillPercent = Math.min((count / maxLevel) * 100, 100);
        const item = document.createElement("div");
        item.className = `synergy-item ${active ? "active" : ""}`;
        item.innerHTML = `
          <div class="synergy-count">${count}</div>
          <div class="synergy-meta">
            <div class="synergy-top">
              <span>${name}</span>
              <span class="tiny">${info ? info.levels.join("/") : "-"}</span>
            </div>
            <div class="progress"><div class="progress-fill" style="width:${fillPercent}%"></div></div>
            <div class="tiny">${active ? `発動: ${active.label} +${active.value}${active.suffix}` : next ? `あと ${next - count} 体で発動` : "未設定シナジー"}</div>
          </div>
        `;
        el.synergyList.appendChild(item);
      });
      el.unitCount.textContent = state.board.filter(Boolean).length;
    }

    function applySynergyBonusToStats(unitName, star) {
      const unit = gameData.units[unitName];
      const index = star - 1;
      const stats = {};
      Object.entries(unit.stats).forEach(([k, arr]) => { stats[k] = arr[index]; });

      const counts = countSynergies();
      unit.synergy.forEach(sName => {
        const active = getActiveBreakpoint(sName, counts[sName] || 0);
        if (!active) return;
        switch (sName) {
          case "アルカナム": stats.attack += active.value; break;
          case "サモナー": stats.hp += active.value; break;
          case "F.P.S": stats.crit += active.value; break;
          case "100万クレジット": stats.speed = +(stats.speed + active.value).toFixed(2); break;
          case "聞き専": stats.magic += active.value; break;
          case "ドレッドノート": stats.armor += active.value; break;
        }
      });
      return stats;
    }

        return;

      const stats = unit.stats;
      const starStats = applySynergyBonusToStats(name, state.detailStar);
      const countInfo = countSynergies();
      const activeSynergyNotes = unit.synergy
        .map(s => {
          const active = getActiveBreakpoint(s, countInfo[s] || 0);

      const rows = Object.keys(statLabels).map(key => {

        return `<tr><th>${statLabels[key]}</th><td>${formatted}</td></tr>`;

        <table class="stats-table">
          <thead><tr><th>ステータス</th><th>★1 / ★2 / ★3</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="skill-box">
          <div class="small-title">スキル</div>
          <div style="margin-top:8px; font-weight:800;">${unit.skill?.name || "未設定"}</div>
          <div class="subtext" style="margin-top:6px;">${unit.skill?.description || "説明なし"}</div>
          <div class="list-inline">
            ${unit.skill?.values ? [`<span class="tag">${unit.skill.label || "値"}: ${unit.skill.values.join(" / ")}</span>`].join("") : ""}
            ${unit.skill?.sp != null ? `<span class="tag">SP ${unit.skill.sp}</span>` : ""}
          </div>
        </div>
        <div class="effect-box">
          <strong>現在のシナジー反映（★${state.detailStar}）</strong><br>
          ${activeSynergyNotes.length ? activeSynergyNotes.join(" / ") : "このユニットに反映中のシナジーはありません。"}
        </div>
      `;

      el.detailCard.querySelectorAll(".star-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.detailStar = Number(btn.dataset.star);
          if (state.selectedTileIndex != null && state.board[state.selectedTileIndex]?.name === name) {
            state.board[state.selectedTileIndex].star = state.detailStar;
          }
          renderAll();
        });
      });

      syncEditor();
    }

    function syncEditor() {
      const name = state.selectedDetailUnit || Object.keys(gameData.units)[0];
      if (!gameData.units[name]) return;
      el.dataEditor.value = JSON.stringify({ [name]: gameData.units[name] }, null, 2);
    }

    function placeInFirstEmpty(name) {
      const idx = state.board.findIndex(slot => !slot);
      if (idx === -1) return;
      state.board[idx] = { name, star: 1 };
      state.selectedDetailUnit = name;
      state.detailStar = 1;
      state.selectedTileIndex = idx;
      renderAll();
    }

    function renderBuildText() {
      const text = state.board.map((slot, i) => slot ? `${i + 1}:${slot.name}(★${slot.star})` : `${i + 1}:空`).join("\n");
      el.buildText.value = text;
    }

    function renderAll() {
      renderBoard();
      renderBench();
      renderSynergies();
      renderDetail();
      renderBuildText();
      el.selectedUnitLabel.textContent = state.selectedUnit || "なし";
    }

    function saveLocal() {
      const payload = { board: state.board, selectedDetailUnit: state.selectedDetailUnit, detailStar: state.detailStar };
      localStorage.setItem(storageKey, JSON.stringify(payload));
      alert("ブラウザに保存しました。");
    }

    function loadLocal() {
      const raw = localStorage.getItem(storageKey);
      if (!raw) {
        alert("保存データがありません。");
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed.board) && parsed.board.length === 18) state.board = parsed.board;
        state.selectedDetailUnit = parsed.selectedDetailUnit || state.selectedDetailUnit;
        state.detailStar = parsed.detailStar || 1;
        renderAll();
      } catch {
        alert("保存データの読み込みに失敗しました。");
      }
    }

    function resetStorage() {
      localStorage.removeItem(storageKey);
      alert("保存データを削除しました。");
    }

    function copyBuild() {
      navigator.clipboard.writeText(el.buildText.value).then(() => alert("構成テキストをコピーしました。"));
    }

    function applyJsonEdit() {
      try {
        const parsed = JSON.parse(el.dataEditor.value);
        const entries = Object.entries(parsed);
        if (!entries.length) throw new Error("データが空です。");
        const [name, unit] = entries[0];
        gameData.units[name] = unit;
        state.selectedDetailUnit = name;
        state.selectedUnit = name;
        renderSynergyChips();
        renderAll();
        alert("キャラデータを反映しました。");
      } catch (err) {
        alert(`JSONの反映に失敗しました: ${err.message}`);
      }
    }

    function downloadJson() {
      const blob = new Blob([JSON.stringify(gameData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "gameData.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function bindEvents() {
      el.searchInput.addEventListener("input", e => { state.search = e.target.value; renderBench(); });
      el.costFilter.addEventListener("change", e => { state.costFilter = e.target.value; renderBench(); });
      el.clearBoardBtn.addEventListener("click", () => { state.board = Array(18).fill(null); state.selectedTileIndex = null; renderAll(); });
      el.copyBuildBtn.addEventListener("click", copyBuild);
      el.saveLocalBtn.addEventListener("click", saveLocal);
      el.importBtn.addEventListener("click", loadLocal);
      el.resetStorageBtn.addEventListener("click", resetStorage);
      el.applyJsonBtn.addEventListener("click", applyJsonEdit);
      el.downloadJsonBtn.addEventListener("click", downloadJson);

      window.addEventListener("keydown", e => {
        if (e.key === "Escape") {
          state.selectedUnit = null;
          state.selectedTileIndex = null;
          renderAll();
        }
        if ((e.key === "Delete" || e.key === "Backspace") && state.selectedTileIndex != null) {
          state.board[state.selectedTileIndex] = null;
          renderAll();
        }
      });
    }

    function init() {
      state.selectedDetailUnit = Object.keys(gameData.units)[0];
      renderSynergyChips();
      bindEvents();
      renderAll();
    }

    init();
  </script>
</body>
</html>
