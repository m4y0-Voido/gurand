<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TFT キャラデータ</title>

<style>

body{
background:#020617;
color:white;
font-family:sans-serif;
padding:40px;
}

.card{
background:#0f172a;
padding:20px;
width:400px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:6px;
border-bottom:1px solid #334155;
}

.skill{
margin-top:20px;
}

</style>
</head>

<body>

<div class="card" id="unitCard"></div>

<script>

fetch("gameData.json")
.then(r=>r.json())
.then(data=>{

const unit=data.units["いる"]

let html=`
<h2>いる</h2>

<p>コスト ★${unit.cost}</p>

<p>
シナジー :
${unit.synergy.join(" / ")}
</p>

<table>

<tr>
<td>HP</td>
<td>${unit.stats.hp.join(" / ")}</td>
</tr>

<tr>
<td>攻撃</td>
<td>${unit.stats.attack.join(" / ")}</td>
</tr>

<tr>
<td>魔法</td>
<td>${unit.stats.magic.join(" / ")}</td>
</tr>

<tr>
<td>物防</td>
<td>${unit.stats.armor.join(" / ")}</td>
</tr>

<tr>
<td>魔防</td>
<td>${unit.stats.magicRes.join(" / ")}</td>
</tr>

<tr>
<td>速度</td>
<td>${unit.stats.speed.join(" / ")}</td>
</tr>

<tr>
<td>会心率</td>
<td>${unit.stats.crit.join("% / ")}%</td>
</tr>

<tr>
<td>貫通</td>
<td>${unit.stats.penetration.join(" / ")}</td>
</tr>

</table>

<div class="skill">

<h3>${unit.skill.name}</h3>

<p>${unit.skill.description}</p>

<p>
ダメージ
${unit.skill.damage.join(" / ")}
</p>

<p>
SP ${unit.skill.sp}
</p>

</div>
`

document.getElementById("unitCard").innerHTML=html

})

</script>

</body>
</html>
