<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friend TFT Builder</title>
  <style>
    :root {
      --bg: #040814;
      --panel: #071225;
      --line: #112447;
      --line-soft: rgba(122, 163, 255, 0.18);
      --text: #f5f7ff;
      --sub: #9eb0d7;
      --muted: #6680b8;
      --teal: #20e3c2;
      --blue: #55a3ff;
      --purple: #b56cff;
      --gold: #f5b83d;
      --cost1: #bfc7d8;
      --cost2: #5ee68d;
      --cost3: #58a8ff;
      --cost4: #cb8bff;
      --cost5: #ffc857;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.34);
      --radius: 16px;
      --tile-size: 104px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(32, 227, 194, 0.08), transparent 18%),
        radial-gradient(circle at top right, rgba(181, 108, 255, 0.10), transparent 20%),
        linear-gradient(180deg, #030712 0%, #030814 100%);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 250px 1fr 340px;
      height: 100vh;
    }

    .panel {
      background: linear-gradient(180deg, rgba(7,18,37,0.96), rgba(4,10,21,0.96));
      border-right: 1px solid var(--line);
      min-height: 0;
      overflow: auto;
    }

    .left, .right {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .center {
      min-width: 0;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(22, 9, 18, 0.42) 0 57%, rgba(4, 20, 48, 0.46) 57% 100%),
        linear-gradient(180deg, #030814 0%, #071225 100%);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 10, 20, 0.55);
      backdrop-filter: blur(12px);
    }

    .app-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: #dbf5ff;
      text-transform: uppercase;
    }

    .subtext { color: var(--sub); font-size: 12px; line-height: 1.5; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: var(--sub);
      font-size: 12px;
    }

    .synergy-list { display: flex; flex-direction: column; gap: 8px; }
    .synergy-entry {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, outline-color .12s ease;
    }
    .synergy-entry:hover { transform: translateY(-1px); }
    .synergy-tier0 { opacity: 0.35; }
    .synergy-tier1 { color: #55a3ff; }
    .synergy-tier2 { color: #cfd6e6; }
    .synergy-tier3 { color: #f5b83d; }
    .synergy-tier4 { color: #b56cff; }

    .board-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      min-height: 0;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(6, var(--tile-size));
      grid-template-rows: repeat(3, var(--tile-size));
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(8,14,28,0.7), rgba(5,9,18,0.7));
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), var(--shadow);
    }

    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      border-radius: 14px;
      border: 1px solid rgba(120, 28, 56, 0.35);
      background:
        linear-gradient(180deg, rgba(43, 5, 19, 0.42), rgba(16, 6, 13, 0.42)),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      position: relative;
    }

    .tile:nth-child(n+13) {
      border-color: rgba(23, 80, 162, 0.35);
      background:
        linear-gradient(180deg, rgba(3, 18, 58, 0.38), rgba(4, 13, 33, 0.46)),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
    }

    .slot-indicator {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.38);
    }

    .bench-wrap { padding: 0 18px 18px; }
    .bench-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 12px;
    }

    .unit-btn, .placed-unit {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2px;
      cursor: pointer;
      overflow: hidden;
      user-select: none;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.10), rgba(255,255,255,0.02) 45%, rgba(255,255,255,0.01) 55%), #0e1f3c;
      transition: transform .14s ease;
      border: 3px solid transparent;
      box-shadow: inset 0 0 18px rgba(255,255,255,0.08);
    }

    .unit-btn:hover, .placed-unit:hover { transform: translateY(-2px) scale(1.02); }
    .ring-cost-1 { border-color: var(--cost1); }
    .ring-cost-2 { border-color: var(--cost2); }
    .ring-cost-3 { border-color: var(--cost3); }
    .ring-cost-4 { border-color: var(--cost4); }
    .ring-cost-5 { border-color: var(--cost5); }

    .unit-name { font-size: 13px; font-weight: 800; line-height: 1.1; max-width: 76px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .unit-stars { font-size: 11px; color: #ffd76b; }
    .unit-role { font-size: 10px; color: var(--sub); }
    .unit-cost-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
      background: rgba(2,8,23,0.85);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .tag { font-size: 11px; padding: 5px 8px; border-radius: 999px; color: #dce8ff; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); display: inline-block; margin: 2px; }
    .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    .stats-table th, .stats-table td { padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: left; }
    .stats-table th { color: var(--sub); font-weight: 600; }

    @media (max-width: 1180px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel left">
      <div class="app-title">Synergies</div>
      <div class="subtext">クリックで最大2つまで絞り込み</div>
      <div class="pill"><span id="unitCount">0</span> / 9</div>
      <div id="synergyList" class="synergy-list"></div>
    </aside>

    <main class="center">
      <div class="toolbar">
        <div>
          <div class="app-title">Friend TFT Builder</div>
          <div class="subtext">MetaTFT風ビルドツール / 3×6 ボード</div>
        </div>
        <div class="pill">選択中: <strong id="selectedUnitLabel">なし</strong></div>
      </div>

      <div class="board-wrap">
        <div id="board" class="board-grid"></div>
      </div>

      <div class="bench-wrap">
        <div id="bench" class="bench-grid"></div>
      </div>
    </main>

    <aside class="panel right">
      <div id="detail"></div>
    </aside>
  </div>

  <script>
    const MAX_UNITS = 9;

    function baseUnit(cost, role, synergy) {
      return {
        cost,
        role,
        synergy,
        stats: {
          hp: ["?", "?", "?"],
          attack: ["?", "?", "?"],
          magic: ["?", "?", "?"],
          armor: ["?", "?", "?"],
          magicRes: ["?", "?", "?"],
          speed: ["?", "?", "?"],
          crit: ["?", "?", "?"],
          penetration: ["?", "?", "?"]
        },
        skill: {
          name: "???",
          description: "・・・",
          values: ["?", "?", "?"],
          label: "",
          sp: "?"
        }
      };
    }

    const gameData = {
      synergies: {
        "星を追う者": { levels: [2, 4, 6, 7], values: [2, 3, 4, 5], label: "SP効率" },
        "サモナー": { levels: [5], values: [300], label: "体力" },
        "F.P.S": { levels: [2, 4, 6, 7], values: [15, 30, 45, 50], label: "会心率", suffix: "%" },
        "100万クレジット": { levels: [2, 3, 4, 5], values: [0.1, 0.2, 0.3, 0.4], label: "攻撃速度" },
        "聞き専": { levels: [3], values: [40], label: "魔法力" },
        "ドレッドノート": { levels: [2, 3, 4, 5, 6], values: [20, 30, 40, 50, 60], label: "物理防御" },
        "ユーフォリア": { levels: [3, 6, 9], values: [15, 30, 45], label: "回復力", suffix: "%" },
        "リーサルウェポン": { levels: [2, 4, 6, 8], values: [5, 10, 15, 20], label: "貫通力" },
        "アルカナム": { levels: [2, 3, 5, 6], values: [10, 20, 30, 40], label: "攻撃力" },
        "最後の刺客": { levels: [1], values: [50], label: "ダメージ" }
      },
      units: {
        "いる": baseUnit(1, "タンク", ["サモナー", "ドレッドノート", "アルカナム"]),
        "巻巻": baseUnit(1, "タンク", ["サモナー", "ドレッドノート"]),
        "ばーれい": baseUnit(1, "アッパー", ["F.P.S", "ユーフォリア"]),
        "彼岸桜": baseUnit(1, "ヒーラー", ["ユーフォリア", "聞き専"]),
        "雫唯": baseUnit(1, "ダウナー", ["サモナー", "アルカナム", "100万クレジット"]),
        "うた": baseUnit(1, "アタッカー", ["星を追う者", "リーサルウェポン"]),
        "ユート": baseUnit(1, "アタッカー", ["F.P.S", "星を追う者", "リーサルウェポン"]),
        "タクラ": baseUnit(2, "アッパー", ["ユーフォリア", "100万クレジット"]),
        "いまはる": baseUnit(2, "ヒーラー", ["ユーフォリア", "星を追う者", "100万クレジット"]),
        "ヒロ": baseUnit(2, "アタッカー", ["F.P.S", "リーサルウェポン"]),
        "ぶろ": baseUnit(2, "アタッカー", ["F.P.S", "サモナー", "リーサルウェポン"]),
        "ボイド": baseUnit(2, "ヒーラー", ["サモナー", "ユーフォリア"]),
        "卵": baseUnit(2, "ダウナー", ["アルカナム", "聞き専"]),
        "ましゅ": baseUnit(2, "ダウナー", ["ドレッドノート", "星を追う者"]),
        "きり": baseUnit(2, "ダウナー", ["アルカナム", "ドレッドノート"]),
        "あかつき": baseUnit(3, "アッパー", ["F.P.S", "星を追う者", "ユーフォリア"]),
        "えびふらい": baseUnit(3, "ダウナー", ["アルカナム", "星を追う者"]),
        "ひでぼう": baseUnit(3, "アッパー", ["サモナー", "星を追う者", "F.P.S"]),
        "グリム": baseUnit(3, "ヒーラー", ["サモナー", "ユーフォリア"]),
        "うみ": baseUnit(3, "アッパー", ["サモナー", "ユーフォリア"]),
        "さと": baseUnit(3, "アタッカー", ["サモナー", "リーサルウェポン"]),
        "ブルーサンダー": baseUnit(4, "ダウナー", ["アルカナム", "星を追う者"]),
        "Rio": baseUnit(4, "ダウナー", ["F.P.S", "サモナー", "100万クレジット"]),
        "まふぃ": baseUnit(4, "アタッカー", ["サモナー", "100万クレジット", "リーサルウェポン"]),
        "yukitani": baseUnit(4, "アッパー", ["サモナー", "ドレッドノート"]),
        "未完成": baseUnit(4, "タンク", ["サモナー", "F.P.S"]),
        "ふうり": baseUnit(5, "アタッカー", ["サモナー", "リーサルウェポン"]),
        "サム": baseUnit(5, "アタッカー", ["最後の刺客"]),
        "shovel": baseUnit(5, "タンク", ["ドレッドノート", "聞き専"])
      }
    };

    const state = {
      board: Array(18).fill(null),
      selected: null,
      selectedDetail: null,
      synergyFilter: []
    };

    function countSynergy() {
      const set = new Set();
      const counts = {};
      state.board.forEach((u) => {
        if (!u) return;
        if (set.has(u.name)) return;
        set.add(u.name);
        gameData.units[u.name].synergy.forEach((s) => {
          counts[s] = (counts[s] || 0) + 1;
        });
      });
      return counts;
    }

    function createUnitElement(name, mode = "bench", star = 1) {
      const unit = gameData.units[name];
      const div = document.createElement("div");
      div.className = `${mode === "bench" ? "unit-btn" : "placed-unit"} ring-cost-${unit.cost}`;
      div.innerHTML = `
        <div class="unit-cost-badge">${unit.cost}</div>
        <div class="unit-name">${name}</div>
        <div class="unit-stars">${"★".repeat(star)}</div>
        <div class="unit-role">${unit.role}</div>
      `;
      return div;
    }

    function renderBoard() {
      const board = document.getElementById("board");
      board.innerHTML = "";
      state.board.forEach((slot, i) => {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.innerHTML = `<div class="slot-indicator">${i + 1}</div>`;

        tile.onclick = () => {
          if (!state.selected) return;
          const placed = state.board.filter(Boolean).length;
          if (!slot && placed >= MAX_UNITS) return;
          state.board[i] = { name: state.selected, star: slot?.star || 1 };
          state.selectedDetail = state.selected;
          render();
        };

        tile.ondblclick = () => {
          if (!slot) return;
          slot.star = slot.star === 3 ? 1 : slot.star + 1;
          state.selectedDetail = slot.name;
          render();
        };

        tile.oncontextmenu = (e) => {
          e.preventDefault();
          state.board[i] = null;
          render();
        };

        if (slot) {
          const unitEl = createUnitElement(slot.name, "placed", slot.star);
          unitEl.onclick = (e) => {
            e.stopPropagation();
            state.selectedDetail = slot.name;
            renderDetail(slot.name);
          };
          tile.appendChild(unitEl);
        }

        board.appendChild(tile);
      });
    }

    function renderBench() {
      const bench = document.getElementById("bench");
      bench.innerHTML = "";

      const units = Object.entries(gameData.units).filter(([, unit]) => {
        if (state.synergyFilter.length === 0) return true;
        if (state.synergyFilter.length === 1) return unit.synergy.includes(state.synergyFilter[0]);
        return unit.synergy.includes(state.synergyFilter[0]) && unit.synergy.includes(state.synergyFilter[1]);
      });

      units.forEach(([name]) => {
        const card = createUnitElement(name, "bench", 1);
        card.onclick = () => {
          state.selected = name;
          state.selectedDetail = name;
          render();
        };
        bench.appendChild(card);
      });
    }

    function renderDetail(name = state.selectedDetail || Object.keys(gameData.units)[0]) {
      const unit = gameData.units[name];
      const detail = document.getElementById("detail");
      if (!unit) {
        detail.innerHTML = "";
        return;
      }

      let rows = "";
      Object.keys(unit.stats).forEach((k) => {
        rows += `<tr><th>${k}</th><td>${unit.stats[k].join(" / ")}</td></tr>`;
      });

      detail.innerHTML = `
        <h2>${name}</h2>
        <div>${unit.role} / ${unit.cost}</div>
        <div>${unit.synergy.map((s) => `<span class="tag">${s}</span>`).join("")}</div>
        <table class="stats-table">${rows}</table>
        <h3>${unit.skill?.name || "???"}</h3>
        <div>${unit.skill?.description || "・・・"}</div>
      `;
    }

    function getSynergyTier(info, count) {
      let tier = 0;
      info.levels.forEach((lv, i) => {
        if (count >= lv) tier = i + 1;
      });
      return tier;
    }

    function renderSynergy() {
      const list = document.getElementById("synergyList");
      const counts = countSynergy();
      const names = Object.keys(gameData.synergies)
        .map((name) => ({ name, count: counts[name] || 0, info: gameData.synergies[name] }))
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, "ja"));

      list.innerHTML = "";

      const allBtn = document.createElement("div");
      allBtn.className = "synergy-entry";
      allBtn.textContent = "全キャラ";
      allBtn.onclick = () => {
        state.synergyFilter = [];
        render();
      };
      list.appendChild(allBtn);

      names.forEach(({ name, count, info }) => {
        const div = document.createElement("div");
        div.className = "synergy-entry";
        div.textContent = `${name} : ${count}`;

        const lines = info.levels.map((lv, i) => {
          const suffix = info.suffix || "";
          return `${lv}体 : ${info.label} +${info.values[i]}${suffix}`;
        });
        div.title = lines.join("\r\n");

        const tier = getSynergyTier(info, count);
        const maxTier = info.levels.length;
        if (tier === 0) div.classList.add("synergy-tier0");
        else if (tier === 1) div.classList.add("synergy-tier1");
        else if (tier === 2) div.classList.add("synergy-tier2");
        else if (tier === 3) div.classList.add("synergy-tier3");
        else if (tier >= maxTier) div.classList.add("synergy-tier4");

        if (state.synergyFilter.includes(name)) {
          div.style.outline = "2px solid #20e3c2";
        }

        div.onclick = () => {
          if (state.synergyFilter.includes(name)) {
            state.synergyFilter = state.synergyFilter.filter((s) => s !== name);
          } else {
            if (state.synergyFilter.length >= 2) return;
            state.synergyFilter.push(name);
          }
          render();
        };

        list.appendChild(div);
      });

      document.getElementById("unitCount").textContent = state.board.filter(Boolean).length;
    }

    function render() {
      renderBoard();
      renderBench();
      renderSynergy();
      renderDetail();
      document.getElementById("selectedUnitLabel").textContent = state.selected || "なし";
    }

    function runSelfTests() {
      console.assert(gameData.synergies["リーサルウェポン"].values[3] === 20, "リーサルウェポン段階値");
      console.assert(gameData.units["サム"].synergy[0] === "最後の刺客", "サムのシナジー");
      const tooltip = gameData.synergies["F.P.S"].levels.map((lv, i) => `${lv}体 : ${gameData.synergies["F.P.S"].label} +${gameData.synergies["F.P.S"].values[i]}${gameData.synergies["F.P.S"].suffix || ""}`).join("\r\n");
      console.assert(tooltip.includes("2体 : 会心率 +15%"), "ツールチップ整形");
    }

    runSelfTests();
    render();
  </script>
</body>
</html>
